<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap');

body{
    margin:0;
    overflow:hidden;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#1a001f,#330033,#4d001f);
    color:white;
}

/* Background Glow */
body::before{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    background:radial-gradient(circle,rgba(255,0,150,0.4),transparent 70%);
    top:-100px;
    left:-100px;
    filter:blur(80px);
}

/* Pages */
.page{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}
.active{
    display:flex;
}

/* Luxury Card */
.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
    max-width:500px;
}

/* Headings */
h1{
    font-family:'Playfair Display', serif;
    font-size:36px;
    margin-bottom:20px;
}

/* Buttons */
button{
    background:linear-gradient(45deg,#ff4da6,#ff0066);
    border:none;
    padding:15px 35px;
    border-radius:50px;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(255,0,100,0.6);
}

/* Envelope */
.envelope{
    width:220px;
    height:150px;
    background:linear-gradient(145deg,#ff4da6,#99004d);
    margin:30px auto;
    border-radius:12px;
    cursor:pointer;
    position:relative;
    transition:0.5s;
}
.envelope:before{
    content:"";
    position:absolute;
    width:0;
    height:0;
    border-left:110px solid transparent;
    border-right:110px solid transparent;
    border-bottom:80px solid rgba(255,255,255,0.2);
    top:0;
}

/* Cake */
.cake-container{
    position:relative;
    width:300px;
    height:200px;
    margin:30px auto;
}

.cake{
    width:100%;
    height:150px;
    background:linear-gradient(#6b3e26,#3b1f10);
    border-radius:20px;
    position:absolute;
    bottom:0;
}

.cake-top{
    position:absolute;
    width:100%;
    height:40px;
    background:linear-gradient(to right,#ff4da6,#ff99cc);
    border-radius:50%;
    top:20px;
}

/* Split */
.split .cake{
    transform:translateX(-20px);
}

/* Gift */
.gift{
    width:150px;
    height:150px;
    background:linear-gradient(45deg,#ff0066,#ff66b2);
    margin:30px auto;
    border-radius:15px;
    cursor:pointer;
}

/* Confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<div class="card">
<h1>Happy Birthday, My Love ❤️</h1>
<p>A special journey begins...</p>
<button onclick="nextPage(2)">Start the Magic ✨</button>
</div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<div class="card">
<h1>Love Letter 💌</h1>
<div class="envelope" onclick="openLetter()"></div>
<div id="letter" style="display:none;">
<p>
You are the most beautiful soul in my world.<br><br>
Forever yours ❤️
</p>
<button onclick="nextPage(3)">Continue</button>
</div>
</div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<div class="card">
<h1>Cut the Cake 🎂</h1>
<p>Drag across the cake ✂️</p>
<div class="cake-container"
onmousedown="startDrag(event)"
onmouseup="endDrag()"
onmousemove="drag(event)"
ontouchstart="startDrag(event)"
ontouchend="endDrag()"
ontouchmove="dragTouch(event)">
<div class="cake" id="cake">
<div class="cake-top"></div>
</div>
</div>
<button onclick="nextPage(4)">Continue</button>
</div>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
<div class="card">
<h1>Make a Wish ✨</h1>
<button onclick="nextPage(5)">Wish Done</button>
</div>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
<div class="card">
<h1>Final Surprise 🎁</h1>
<div class="gift" onclick="confetti()"></div>
<p>Happy Birthday ❤️</p>
<button onclick="location.reload()">Replay</button>
</div>
</div>

<script>

function nextPage(n){
document.querySelector('.active').classList.remove('active');
document.getElementById("page"+n).classList.add('active');
}

function openLetter(){
document.getElementById("letter").style.display="block";
confetti();
}

let isDragging=false;

function startDrag(){
isDragging=true;
}

function endDrag(){
isDragging=false;
}

function drag(e){
if(!isDragging) return;
document.getElementById("cake").classList.add("split");
confetti();
}

function dragTouch(e){
if(!isDragging) return;
document.getElementById("cake").classList.add("split");
confetti();
}

function confetti(){
for(let i=0;i<60;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
}
}

</script>

</body>
</html>
