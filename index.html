<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffe6f0,#fff5e6);
    overflow:hidden;
}

.page{
    display:none;
    height:100vh;
    text-align:center;
    padding:20px;
}
.active{display:block;}

h1{color:#ff4d88;}

button{
    background:#ff4d88;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:40px;
    font-size:16px;
    cursor:pointer;
}

/* Envelope */
.envelope{
    width:220px;
    height:150px;
    background:#ff99bb;
    margin:40px auto;
    position:relative;
    border-radius:10px;
    cursor:pointer;
}
.envelope:before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:0;
    height:0;
    border-left:110px solid transparent;
    border-right:110px solid transparent;
    border-bottom:80px solid #ff4d88;
    transition:0.5s;
}
.envelope.open:before{
    transform:rotateX(180deg);
}

/* Cake */
.cake-container{
    position:relative;
    width:300px;
    height:200px;
    margin:40px auto;
}

.cake{
    width:100%;
    height:150px;
    background:#8B4513;
    border-radius:15px;
    position:absolute;
    bottom:0;
    transition:0.4s;
}

.cake-top{
    position:absolute;
    width:100%;
    height:40px;
    background:pink;
    border-radius:50%;
    top:20px;
}

/* Split */
.left-half,.right-half{
    position:absolute;
    width:50%;
    height:150px;
    background:#8B4513;
    bottom:0;
    transition:0.5s;
}

.left-half{left:0;}
.right-half{right:0;}

.split .left-half{
    transform:translateX(-40px);
}
.split .right-half{
    transform:translateX(40px);
}

/* Gift */
.gift{
    width:160px;
    height:160px;
    background:#ff4d88;
    margin:50px auto;
    border-radius:15px;
    position:relative;
    cursor:pointer;
}
.gift:before,.gift:after{
    content:"";
    position:absolute;
    background:white;
}
.gift:before{width:20px;height:160px;left:70px;}
.gift:after{width:160px;height:20px;top:70px;}

/* Confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<h1>Happy Birthday 🎂✨</h1>
<button onclick="nextPage(2)">Let’s Gooo ✨</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<h1>A Birthday Love Letter 💌</h1>
<div class="envelope" id="envelope" onclick="openLetter()"></div>

<div id="letter" style="display:none;">
<p>
My dearest birthday girl 💖<br><br>
You deserve all the magic, happiness and love in the world.<br><br>
Forever yours 💕
</p>
<button onclick="nextPage(3)">Continue ✨</button>
</div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<h1>It’s Cake Time 🎂</h1>
<p>Drag across the cake to cut ✂️</p>

<div class="cake-container"
onmousedown="startDrag(event)"
onmouseup="endDrag()"
onmousemove="mouseMove(event)"
ontouchstart="startDrag(event)"
ontouchend="endDrag()"
ontouchmove="touchMove(event)">

<div class="cake" id="cake">
<div class="cake-top"></div>
<div class="left-half"></div>
<div class="right-half"></div>
</div>

</div>

<button onclick="nextPage(4)">Continue ✨</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
<h1>Time to Make a Wish ✨</h1>
<button onclick="nextPage(5)">I’ve Made My Wish 💫</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
<h1>Surprise 🎉</h1>
<div class="gift" onclick="openGift()"></div>
<div id="finalMsg" style="display:none;">
<h2>Happy Birthday! 💖</h2>
<button onclick="restart()">Replay ✨</button>
</div>
</div>

<script>

function nextPage(num){
document.querySelector('.active').classList.remove('active');
document.getElementById("page"+num).classList.add('active');
}

/* Envelope */
function openLetter(){
document.getElementById("envelope").classList.add("open");
document.getElementById("letter").style.display="block";
createConfetti();
}

/* Cake Drag */
let isDragging=false;
let cake=document.getElementById("cake");
let splitDone=false;

function startDrag(e){
isDragging=true;
splitDone=false;
}

function endDrag(){
isDragging=false;
}

function mouseMove(e){
if(!isDragging) return;
let rect=cake.getBoundingClientRect();
let x=e.clientX-rect.left;
checkCut(x);
}

function touchMove(e){
if(!isDragging) return;
let touch=e.touches[0];
let rect=cake.getBoundingClientRect();
let x=touch.clientX-rect.left;
checkCut(x);
}

function checkCut(x){
let center=cake.offsetWidth/2;
if(x>center-10 && x<center+10 && !splitDone){
cake.classList.add("split");
createConfetti();
splitDone=true;
}
}

/* Gift */
function openGift(){
document.getElementById("finalMsg").style.display="block";
createConfetti();
}

/* Confetti */
function createConfetti(){
for(let i=0;i<70;i++){
let conf=document.createElement("div");
conf.className="confetti";
conf.style.left=Math.random()*100+"vw";
conf.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
conf.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(conf);
setTimeout(()=>conf.remove(),4000);
}
}

function restart(){
location.reload();
}

</script>

</body>
</html>
