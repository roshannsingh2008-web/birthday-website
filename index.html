<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Website</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffe6f0,#fff5e6);
    overflow:hidden;
}

.page{
    display:none;
    height:100vh;
    text-align:center;
    padding:20px;
}

.page.active{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

button{
    background:#ff4d88;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:40px;
    font-size:16px;
    cursor:pointer;
}

/* Cake */
.cake{
    width:280px;
    height:150px;
    background:#8B4513;
    border-radius:15px;
    position:relative;
    margin:40px auto;
}

.cake-top{
    position:absolute;
    width:100%;
    height:40px;
    background:pink;
    border-radius:50%;
    top:-20px;
}

.split .left{
    transform:translateX(-40px);
}
.split .right{
    transform:translateX(40px);
}

.left,.right{
    position:absolute;
    width:50%;
    height:150px;
    background:#8B4513;
    bottom:0;
    transition:0.4s;
}

.left{left:0;}
.right{right:0;}

/* Confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<h1>Happy Birthday 🎂</h1>
<button onclick="nextPage(2)">Start ✨</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<h1>Love Letter 💌</h1>
<p>My dearest birthday girl 💖</p>
<button onclick="nextPage(3)">Continue ✨</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<h1>Cut the Cake ✂️</h1>

<div class="cake-container"
     onmousedown="startDrag(event)"
     onmousemove="drag(event)"
     onmouseup="endDrag()"
     onmouseleave="endDrag()">

    <div class="cake" id="cake">
        <div class="cake-top"></div>
        <div class="left"></div>
        <div class="right"></div>
    </div>

</div>

<button onclick="nextPage(4)">Continue ✨</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
<h1>Make a Wish ✨</h1>
<button onclick="nextPage(5)">Wish Done 💫</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
<h1>Surprise 🎉</h1>
<button onclick="createConfetti()">Celebrate 🎊</button>
</div>

<script>

/* Page Switch */
function nextPage(num){
    document.querySelector('.active').classList.remove('active');
    document.getElementById("page"+num).classList.add('active');
}

/* Cake Drag Cut */
let isDragging=false;

function startDrag(e){
    isDragging=true;
}

function drag(e){
    if(!isDragging) return;

    let cake=document.getElementById("cake");

    if(e.offsetX > 130 && e.offsetX < 150){
        cake.classList.add("split");
        createConfetti();
    }
}

function endDrag(){
    isDragging=false;
}

/* Confetti */
function createConfetti(){
    for(let i=0;i<60;i++){
        let conf=document.createElement("div");
        conf.className="confetti";
        conf.style.left=Math.random()*100+"vw";
        conf.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(conf);
        setTimeout(()=>conf.remove(),4000);
    }
}

</script>

</body>
</html>
